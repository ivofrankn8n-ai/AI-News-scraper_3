<!DOCTYPE html>
<html>
<head>
    <title>Debug Supabase Connection</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .success { color: green; }
        .error { color: red; }
        .info { color: blue; }
    </style>
</head>
<body>
    <h1>Supabase Connection Debug</h1>
    <div id="status">Testing connection...</div>
    <div id="articles"></div>
    
    <script>
        async function debugConnection() {
            const supabaseUrl = 'https://keajnbcsqgyfgyikvbca.supabase.co';
            const supabaseKey = 'sb_publishable_tUM51WsQtzlmiiLABjCnBw_N3HeE0ay';
            
            const statusEl = document.getElementById('status');
            const articlesEl = document.getElementById('articles');
            
            try {
                statusEl.innerHTML = '<p class="info">Initializing Supabase client...</p>';
                
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                statusEl.innerHTML += '<p class="info">Fetching articles...</p>';
                
                const { data, error } = await supabase
                    .from('articles')
                    .select('*')
                    .order('published_at', { ascending: false })
                    .limit(10);
                
                if (error) {
                    statusEl.innerHTML += `<p class="error"><strong>Error:</strong> ${error.message}</p>`;
                    statusEl.innerHTML += `<p class="error"><strong>Details:</strong> ${JSON.stringify(error)}</p>`;
                    
                    // Check for CORS issues
                    if (error.message.includes('CORS') || error.message.includes('Origin') || error.message.includes('cross-origin')) {
                        statusEl.innerHTML += '<p class="error"><strong>CORS Issue Detected:</strong> Supabase may not be configured for this domain.</p>';
                    }
                } else {
                    statusEl.innerHTML += `<p class="success"><strong>Success!</strong> Found ${data.length} articles</p>`;
                    
                    articlesEl.innerHTML = '<h2>Articles:</h2>';
                    data.forEach((article, index) => {
                        articlesEl.innerHTML += `
                            <div style="border: 1px solid #ccc; margin: 10px; padding: 10px;">
                                <h3>${index + 1}. ${article.title}</h3>
                                <p><strong>Source:</strong> ${article.source}</p>
                                <p><strong>Date:</strong> ${article.published_at}</p>
                                <p><strong>Summary:</strong> ${article.subtitle || article.summary || 'No summary'}</p>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                statusEl.innerHTML += `<p class="error"><strong>Exception:</strong> ${err}</p>`;
            }
        }
        
        debugConnection();
    </script>
</body>
</html>
