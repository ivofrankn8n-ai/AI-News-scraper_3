<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minimal Supabase Test</title>
</head>
<body>
    <h1>Minimal Supabase Test</h1>
    <div id="status">Testing connection...</div>
    
    <script>
        console.log('Minimal test started');
        
        async function testConnection() {
            const status = document.getElementById('status');
            
            try {
                console.log('Making fetch request...');
                
                const response = await fetch('https://keajnbcsqgyfgyikvbca.supabase.co/rest/v1/articles?select=*&limit=3', {
                    headers: {
                        'apikey': 'sb_publishable_tUM51WsQtzlmiiLABjCnBw_N3HeE0ay',
                        'Authorization': 'Bearer sb_publishable_tUM51WsQtzlmiiLABjCnBw_N3HeE0ay',
                        'Content-Type': 'application/json'
                    }
                });
                
                console.log('Response status:', response.status);
                
                if (response.ok) {
                    const data = await response.json();
                    console.log('Success! Data:', data);
                    status.innerHTML = `✅ Success! Found ${data.length} articles`;
                } else {
                    console.error('Failed:', response.status, response.statusText);
                    status.innerHTML = `❌ Failed: ${response.status} ${response.statusText}`;
                }
            } catch (error) {
                console.error('Error:', error);
                status.innerHTML = `❌ Error: ${error.message}`;
            }
        }
        
        // Start test immediately
        testConnection();
    </script>
</body>
</html>
