<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Supabase Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Simple Supabase Test</h1>
    <div id="status">Testing connection...</div>
    
    <script>
        async function testConnection() {
            const status = document.getElementById('status');
            
            try {
                console.log('Starting Supabase test...');
                
                const supabaseUrl = 'https://keajnbcsqgyfgyikvbca.supabase.co';
                const supabaseKey = 'sb_publishable_tUM51WsQtzlmiiLABjCnBw_N3HeE0ay';
                
                console.log('Supabase URL:', supabaseUrl);
                console.log('Supabase Key available:', !!supabaseKey);
                
                // Check if Supabase is loaded
                if (!window.supabase) {
                    status.innerHTML = '❌ Supabase library not loaded';
                    console.error('Supabase library not found');
                    return;
                }
                
                console.log('Supabase library loaded, creating client...');
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                console.log('Making Supabase request...');
                const { data, error } = await supabase
                    .from('articles')
                    .select('*')
                    .limit(3);
                
                if (error) {
                    status.innerHTML = `❌ Error: ${error.message}`;
                    console.error('Supabase error:', error);
                } else {
                    status.innerHTML = `✅ Success! Found ${data.length} articles`;
                    console.log('Supabase data:', data);
                }
            } catch (error) {
                status.innerHTML = `❌ Connection failed: ${error.message}`;
                console.error('Connection error:', error);
            }
        }
        
        // Wait for page to load and Supabase library to be ready
        setTimeout(() => {
            testConnection();
        }, 1000);
    </script>
</body>
</html>
