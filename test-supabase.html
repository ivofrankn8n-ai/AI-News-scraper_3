<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Supabase Connection Test</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body>
    <h1>Supabase Connection Test</h1>
    <div id="status">Testing connection...</div>
    
    <script>
        async function testConnection() {
            const status = document.getElementById('status');
            
            try {
                const supabaseUrl = 'https://keajnbcsqgyfgyikvbca.supabase.co';
                const supabaseKey = 'sb_publishable_tUM51WsQtzlmiiLABjCnBw_N3HeE0ay';
                
                console.log('Testing Supabase connection...');
                console.log('URL:', supabaseUrl);
                console.log('Key available:', !!supabaseKey);
                
                const supabase = window.supabase.createClient(supabaseUrl, supabaseKey);
                
                const { data, error } = await supabase
                    .from('articles')
                    .select('*')
                    .limit(5);
                
                if (error) {
                    status.innerHTML = `❌ Error: ${error.message}`;
                    console.error('Supabase error:', error);
                } else {
                    status.innerHTML = `✅ Success! Found ${data.length} articles`;
                    console.log('Supabase data:', data);
                }
            } catch (error) {
                status.innerHTML = `❌ Connection failed: ${error.message}`;
                console.error('Connection error:', error);
            }
        }
        
        testConnection();
    </script>
</body>
</html>
